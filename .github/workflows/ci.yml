name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=critical

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test -- --passWithNoTests --coverage --watchAll=false --coverageReporters=json-summary --coverageReporters=cobertura

    - name: Extract coverage percentage
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: coverage
      run: |
        COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

    - name: Update coverage badge
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      continue-on-error: true
      uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: REPLACE_WITH_YOUR_GIST_ID
        filename: coverage-badge.json
        label: coverage
        message: ${{ steps.coverage.outputs.percentage }}%
        valColorRange: ${{ steps.coverage.outputs.percentage }}
        minColorRange: 50
        maxColorRange: 90
        namedLogo: jest

    - name: Generate coverage report
      if: github.event_name == 'pull_request'
      uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
      with:
        filename: coverage/cobertura-coverage.xml
        badge: true
        format: markdown
        output: both
        thresholds: '60 80'

    - name: Post coverage comment on PR
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@322a2451dae6c7831d1a8b931275a7f78147c888 # v2.1.0
      with:
        recreate: true
        path: code-coverage-results.md
