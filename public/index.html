    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a vision condition simulator?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A vision condition simulator is an educational tool that recreates how people with various visual impairments see the world. Simulated Vision allows you to experience conditions like color blindness, macular degeneration, glaucoma, cataracts, and more through real-time video or image processing using WebGL shaders."
          }
        },
        {
          "@type": "Question",
          "name": "How can I understand what blind people see?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simulated Vision helps you understand blindness and visual impairments by simulating over 42 different vision conditions in real-time. You can upload images or watch YouTube videos with various visual effects applied to experience how people with these conditions perceive the world. It also profiles 128+ famous people with vision conditions."
          }
        },
        {
          "@type": "Question",
          "name": "What does glaucoma look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Glaucoma causes progressive peripheral vision loss while central vision remains sharp until late stages. Early stages show small paracentral scotomas (blind spots), progressing to arc-shaped defects, then tunnel vision, and finally severe constriction. Simulated Vision simulates all stages of glaucoma so you can see exactly what it looks like."
          }
        },
        {
          "@type": "Question",
          "name": "What does macular degeneration look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Age-Related Macular Degeneration (AMD) causes deterioration of the macula, the central part of the retina. It causes loss of central vision — a dark or blurry spot in the center of your visual field — while peripheral vision remains intact. People with AMD may have difficulty reading, recognizing faces, and seeing fine detail. Simulated Vision simulates this condition in real-time."
          }
        },
        {
          "@type": "Question",
          "name": "What is color blindness and how common is it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Color blindness (color vision deficiency) affects how a person perceives colors. The most common types are protanopia/protanomaly (red-blind/weak, ~2% of males) and deuteranopia/deuteranomaly (green-blind/weak, ~6% of males). Tritanopia (blue-blind) is very rare. About 8% of males and 0.5% of females have some form. Simulated Vision can simulate all types including monochromacy (total color blindness)."
          }
        },
        {
          "@type": "Question",
          "name": "Can cataracts be cured?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, cataracts can be treated with surgery. Cataract surgery involves removing the clouded lens and replacing it with an artificial intraocular lens (IOL). Phacoemulsification, the most common technique, uses ultrasound to break up the cataract. It is one of the most common and successful surgeries worldwide. Simulated Vision simulates both nuclear sclerotic and posterior subcapsular cataracts."
          }
        },
        {
          "@type": "Question",
          "name": "Can glaucoma be cured?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Glaucoma cannot be cured, but it can be managed. Treatments include prescription eye drops to lower intraocular pressure, laser trabeculoplasty, minimally invasive glaucoma surgery (MIGS), and traditional surgery for advanced cases. Early detection and treatment can prevent or slow vision loss, but vision already lost cannot be restored. Regular eye exams are crucial."
          }
        },
        {
          "@type": "Question",
          "name": "What famous people are or were blind?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Many famous people have lived with vision conditions, including Helen Keller (deaf-blind activist), Ray Charles and Stevie Wonder (blind musicians), Erik Weihenmayer (first blind person to summit Everest), Claude Monet (cataracts), Andrea Bocelli (blind tenor), Louis Braille (inventor of braille), Galileo (blindness in later life), and many more. Simulated Vision profiles 128+ famous people and lets you simulate their specific vision conditions."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between legally blind and totally blind?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Legal blindness means visual acuity of 20/200 or worse in the better eye with best correction, or a visual field of 20 degrees or less (tunnel vision). Legally blind people often have some usable vision. Total blindness (NLP — no light perception) means complete absence of vision. Most people classified as blind have some remaining vision. Simulated Vision simulates various degrees of vision loss to help understand this spectrum."
          }
        },
        {
          "@type": "Question",
          "name": "What is visual snow syndrome?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visual snow syndrome is a neurological condition where people see persistent tiny flickering dots across their entire visual field, similar to TV static. It can also include afterimages (palinopsia), light sensitivity, floaters, and other visual disturbances. There is currently no cure, though some medications may help reduce symptoms. Simulated Vision can simulate visual snow in real-time."
          }
        },
        {
          "@type": "Question",
          "name": "What is retinitis pigmentosa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Retinitis pigmentosa (RP) is a group of inherited retinal diseases that cause progressive degeneration of photoreceptors. It typically begins with night blindness and gradually narrows the visual field (tunnel vision), potentially leading to legal or complete blindness. There is currently no cure, though gene therapy (Luxturna) has been approved for certain genetic forms. Simulated Vision simulates the progressive tunnel vision caused by RP."
          }
        },
        {
          "@type": "Question",
          "name": "What causes tunnel vision?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tunnel vision (peripheral vision loss) can be caused by several conditions: glaucoma (most common), retinitis pigmentosa, stroke affecting the visual cortex, optic nerve damage, or advanced diabetic retinopathy. The visual field narrows progressively, leaving only a small central area of sight. Simulated Vision simulates tunnel vision from multiple causes so you can understand what it looks like."
          }
        }
      ]
    }

        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          if (type) script.type = type;
          script.onload = resolve;
          script.onerror = () => {
            console.warn('Failed to load Wistia script:', src);
            resolve(); // Resolve anyway to not block the app
          };
          document.head.appendChild(script);
        });
      }
